name: Build KSO-AbyssOS 4.8GB HORROR V1.4 KSO
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    steps:
      - name: 1. Free 30GB Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af --volumes
          sudo apt-get clean

      - name: 2. Install Tools + 10 Games Horror
        run: sudo apt-get update -qq && sudo apt-get install -y live-build debootstrap squashfs-tools xorriso wget git unzip espeak sox imagemagick i3 i3status xterm python3-pygame network-manager network-manager-gnome -qq

      - name: 3. Configure AbyssOS + KSO BRANDING + RAGE
        run: |
          set -e
          mkdir -p abyss && cd abyss
          lb clean
          lb config --architecture amd64 --distribution bookworm --archive-areas "main contrib non-free" --binary-images iso-hybrid --bootappend-live "boot=live components quiet splash" --debian-installer none --iso-volume "KSO_ABYSS" --iso-application "KSO-AbyssOS by KSO" --apt-indices false --config-bootstrap --config-chroot --config-common --config-package-lists --config-systemd
          echo 'network-manager network-manager-gnome python3-pygame i3 i3status xterm espeak' >> config/package-lists/abyssos.list.chroot
          
          # 1. اسمك في البوت
          mkdir -p config/includes.chroot/etc
          echo 'KSO AbyssOS V1.4
          برمجة عبد الله و عبد الرحمن هاني رجب [ kso ]' > config/includes.chroot/etc/issue

          # 2. i3 Bar دم + Windows+X=OFF + Windows+Q=الوداع + Windows+G=قايمة الالعاب
          mkdir -p config/includes.chroot/etc/skel/.config/i3
          cat > config/includes.chroot/etc/skel/.config/i3/config << 'I3EOF'
set $mod Mod4
bar {
  status_command i3status
  colors { statusline #FF0000 background #000000 }
}
bindsym $mod+x exec pkill -f jump.py
bindsym $mod+q exec espeak -v ar "الوداع" && poweroff
bindsym $mod+g exec xterm -bg black -fg red -e /usr/share/abyssos/games.sh
I3EOF
          echo 'DMI KSO-WATCHING' > config/includes.chroot/etc/i3status.conf

          # 3. Xterm الاحمر اول دخول
          mkdir -p config/includes.chroot/etc/skel/.config/autostart
          cat > config/includes.chroot/etc/skel/.config/autostart/xterm.desktop << 'DESKEOF'
[Desktop Entry]
Type=Application
Exec=xterm -bg black -fg red -e "echo أنت لست وحدك هنا... KSO; bash"
DESKEOF

          # 4. JumpScare كل 2-7 دقايق + صوت عربي + تيرمينال
          mkdir -p config/includes.chroot/usr/share/abyssos/jumpscare config/includes.chroot/usr/share/abyssos/sounds config/includes.chroot/etc/skel/.config/autostart
          for i in {1..10}; do wget -qO config/includes.chroot/usr/share/abyssos/jumpscare/$i.png "https://placehold.co/1920x1080/000/FF0000/png?text=KSO+$i"; done
          echo "وراك" | espeak -v ar -w config/includes.chroot/usr/share/abyssos/sounds/scream.ogg -s 60 -p 10
          
          cat > config/includes.chroot/usr/share/abyssos/jumpscare/jump.py << 'PYEOF'
import pygame,random,time,os,subprocess
pygame.init(); pygame.mixer.init(); pygame.mixer.music.load("/usr/share/abyssos/sounds/scream.ogg")
while True:
 time.sleep(random.randint(120,420))
 subprocess.Popen(["xterm","-bg","red","-fg","black","-e","echo لقد رأيتك; sleep 2"])
 pygame.mixer.music.play(); img=pygame.image.load(random.choice([f"/usr/share/abyssos/jumpscare/{i}.png" for i in range(1,11)]))
 s=pygame.display.set_mode((0,0),pygame.FULLSCREEN); s.blit(pygame.transform.scale(img,s.get_size()),(0,0)); pygame.display.flip(); time.sleep(5); pygame.quit(); pygame.init()
PYEOF
          
          cat > config/includes.chroot/etc/skel/.config/autostart/jump.desktop << 'JUMPEOF'
[Desktop Entry]
Type=Application
Exec=python3 /usr/share/abyssos/jumpscare/jump.py
JUMPEOF

          # 5. سكريبت قايمة الالعاب Windows+G
          cat > config/includes.chroot/usr/share/abyssos/games.sh << 'GAMEEOF'
#!/bin/bash
clear
echo "=================================="
echo " KSO HORROR GAMES MENU V1.4"
echo "=================================="
echo " 1. SCP 2. IMSCARED 3. Anatomy 4. Spookys 5. CryOfFear"
echo " 6. Darkwood 7. WOH 8. Paratopic 9. Static 10. Buddy1984"
echo " 0. خروج"
read -p "اختار رقم اللعبة يا KSO: " choice
case $choice in
 1) echo "SCP RUNTIME" ;; 2) echo "IMSCARED RUNTIME" ;; 3) echo "Anatomy RUNTIME" ;; 4) echo "Spookys RUNTIME" ;; 5) echo "CryOfFear RUNTIME" ;;
 6) echo "Darkwood RUNTIME" ;; 7) echo "WOH RUNTIME" ;; 8) echo "Paratopic RUNTIME" ;; 9) echo "Static RUNTIME" ;; 10) echo "Buddy1984 RUNTIME" ;;
 0) exit ;; *) echo "رقم غلط" ;;
esac
read -p "اضغط Enter للخروج..."
GAMEEOF
          chmod +x config/includes.chroot/usr/share/abyssos/games.sh

      - name: 4. Build ISO 4.8GB
        run: cd abyss && lb build

      - name: 5. Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: KSO-AbyssOS-V1.4-KSO.iso
          path: abyss/live-image-amd64.hybrid.iso
