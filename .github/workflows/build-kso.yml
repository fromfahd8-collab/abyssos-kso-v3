        mksquashfs . filesystem.squashfs -comp xz

    - name: Create ISO - V24.2 LIVE UEFI [KSO]
      run: |
        cd $GITHUB_WORKSPACE
        rm -rf isohybrid
        mkdir -p isohybrid/boot/grub
        KERNEL=$(ls /boot/vmlinuz-* | head -n 1)
        INITRD=$(ls /boot/initrd.img-* | head -n 1)
        sudo cp $KERNEL isohybrid/vmlinuz
        sudo cp $INITRD isohybrid/initrd 
        cp rootfs/filesystem.squashfs isohybrid/
        echo 'menuentry "KSO-HANI V24.2 LIVE [KSO] 100 GAMES" { linux /vmlinuz boot=casper quiet splash }' | tee isohybrid/boot/grub/grub.cfg
        sudo cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi isohybrid/BOOTX64.EFI
        sudo xorriso -as mkisofs -o KSO-HANI-LIVE-V24.2.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e BOOTX64.EFI -no-emul-boot -graft-points /boot/grub/grub.cfg=isohybrid/boot/grub/grub.cfg /casper/filesystem.squashfs=isohybrid/filesystem.squashfs /casper/vmlinuz=isohybrid/vmlinuz /casper/initrd=isohybrid/initrd -V "KSO_HANI_100" isohybrid/

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-HANI-LIVE-V24.2-[KSO]-100GAMES
        path: KSO-HANI-LIVE-V24.2.iso
