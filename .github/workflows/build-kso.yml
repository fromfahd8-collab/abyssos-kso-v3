name: Build KSO SnapTube EXE
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: تثبيت FFmpeg
        run: choco install ffmpeg -y
      
      - name: تثبيت المتطلبات
        run: pip install yt-dlp[default] customtkinter pyinstaller pillow --upgrade
      
      - name: تحضير الأيقونة
        run: |
          curl -L -o icon.ico https://raw.githubusercontent.com/sandwich1988/icon/main/snaptube.ico
          if ($?) {
            echo "✅ Icon downloaded successfully"
          } else {
            echo "⚠️ Using default icon"
            python -c "from PIL import Image; img = Image.new('RGB', (64,64), color='#2b7a78'); img.save('icon.ico', format='ICO', sizes=[(64,64)])"
          }
        shell: pwsh
      
      - name: إنشاء ملف main.py
        run: |
          $code = @'
          import customtkinter as ctk
          import yt_dlp, os, threading, tkinter.filedialog as fd
          from tkinter import messagebox
          import webbrowser, datetime, re, sys, ctypes

          ctk.set_appearance_mode("dark")
          ctk.set_default_color_theme("blue")

          app = ctk.CTk()
          app.geometry("900x750")
          app.title("KSO SnapTube - تحميل الفيديوهات والصوت")
          try: 
              app.iconbitmap("icon.ico")
          except: 
              pass

          save_path = os.path.join(os.path.expanduser("~"), "Downloads")
          download_type = "mp3"
          selected_quality = "720p"

          def log(msg, type="info"):
              ts = datetime.datetime.now().strftime("%H:%M:%S")
              icons = {"success":"✅","error":"❌","warning":"⚠️","info":"ℹ️"}
              listbox.insert("end", f"[{ts}] {icons.get(type,'ℹ️')} {msg}")
              listbox.see("end")
              app.update()

          def choose_path():
              global save_path
              temp = fd.askdirectory()
              if temp: 
                  save_path = temp
                  path_label.configure(text=f"📁 مسار التحميل: {save_path}")

          def get_quality(q):
              quality_map = {
                  "144p": "worst[height<=144]",
                  "240p": "best[height<=240]",
                  "360p": "best[height<=360]",
                  "480p": "best[height<=480]",
                  "720p": "best[height<=720]",
                  "1080p": "best[height<=1080]",
                  "4K": "best[height<=2160]"
              }
              return quality_map.get(q, "best[height<=720]")

          def download():
              url = entry.get().strip()
              if not url: 
                  messagebox.showwarning("تنبيه", "ادخل رابط الفيديو")
                  return
              
              btn.configure(state="disabled", text="⏳ جاري التحميل...")
              
              try:
                  if download_type == "mp3":
                      opts = {
                          "format": "bestaudio/best",
                          "postprocessors": [{
                              "key": "FFmpegExtractAudio",
                              "preferredcodec": "mp3",
                              "preferredquality": "320"
                          }],
                          "outtmpl": f"{save_path}/%(playlist_title)s/%(title)s.%(ext)s",
                          "progress_hooks": [lambda d: log(f"تحميل: {d.get('_percent_str','')}", "info") if d.get('status') == 'downloading' else None]
                      }
                  else:
                      opts = {
                          "format": get_quality(selected_quality),
                          "outtmpl": f"{save_path}/%(playlist_title)s/%(title)s.%(ext)s",
                          "progress_hooks": [lambda d: log(f"تحميل: {d.get('_percent_str','')}", "info") if d.get('status') == 'downloading' else None]
                      }
                  
                  with yt_dlp.YoutubeDL(opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if 'entries' in info:
                          entries = [e for e in info['entries'] if e]
                          if entries:
                              log(f"تم العثور على {len(entries)} فيديو", "success")
                          else:
                              log("⚠️ البلاي ليست فارغة", "warning")
                              btn.configure(state="normal", text="🚀 ابدأ التحميل")
                              return
                      else:
                          log("تم العثور على فيديو واحد", "success")
                      
                      ydl.download([url])
                      log("✅ تم التحميل بنجاح", "success")
                      messagebox.showinfo("نجاح", "تم التحميل بنجاح!")
                      
              except Exception as e:
                  log(f"❌ خطأ: {str(e)}", "error")
                  messagebox.showerror("خطأ", str(e))
              
              btn.configure(state="normal", text="🚀 ابدأ التحميل")

          def start():
              threading.Thread(target=download, daemon=True).start()

          # واجهة المستخدم
          ctk.CTkLabel(app, text="🎵 KSO SnapTube", font=("Arial", 30, "bold")).pack(pady=15)
          ctk.CTkLabel(app, text="تحميل فيديوهات وصوت من يوتيوب بجودة عالية", font=("Arial", 14)).pack(pady=5)

          f1 = ctk.CTkFrame(app)
          f1.pack(pady=15, padx=20, fill="x")

          entry = ctk.CTkEntry(f1, placeholder_text="https://youtube.com/... - رابط الفيديو أو البلاي ليست", height=40, font=("Arial", 13))
          entry.pack(side="left", padx=10, pady=10, expand=True, fill="x")

          ctk.CTkButton(app, text="🚀 ابدأ التحميل", command=start, height=50, font=("Arial", 16, "bold"), fg_color="#2b7a78").pack(pady=10, padx=20, fill="x")

          f2 = ctk.CTkFrame(app)
          f2.pack(pady=10, padx=20, fill="x")

          def on_type_change(choice):
              if choice == "MP3 (صوت)":
                  quality_menu.configure(state="disabled")
              else:
                  quality_menu.configure(state="normal")

          menu1 = ctk.CTkOptionMenu(f2, values=["MP3 (صوت)", "MP4 (فيديو)"], command=on_type_change, width=150)
          menu1.pack(side="left", padx=10)
          menu1.set("MP3 (صوت)")

          quality_menu = ctk.CTkOptionMenu(f2, values=["144p","240p","360p","480p","720p","1080p","4K"], width=120)
          quality_menu.pack(side="left", padx=10)
          quality_menu.set("720p")
          quality_menu.configure(state="disabled")

          ctk.CTkButton(f2, text="📂 اختيار المسار", command=choose_path, width=150).pack(side="left", padx=10)
          ctk.CTkButton(f2, text="📁 فتح المجلد", command=lambda: os.startfile(save_path), width=120).pack(side="left", padx=10)

          path_label = ctk.CTkLabel(app, text=f"📁 مسار التحميل: {save_path}", font=("Arial", 12))
          path_label.pack(pady=5)

          listbox = ctk.CTkTextbox(app, height=300, font=("Consolas", 11))
          listbox.pack(pady=10, padx=20, fill="both", expand=True)

          ctk.CTkLabel(app, text="KSO SnapTube v2.0 | تحميل بجودة تصل إلى 4K", font=("Arial", 10)).pack(pady=5)

          log("🎵 KSO SnapTube جاهز للتحميل!", "success")
          log("💡 اختر نوع التحميل والجودة", "info")

          app.mainloop()
          '@
          $code | Out-File -FilePath main.py -Encoding utf8
        shell: pwsh
      
      - name: بناء البرنامج
        run: pyinstaller --onefile --noconsole --name "KSO_SnapTube" --icon=icon.ico --exclude-module matplotlib --exclude-module numpy --exclude-module pandas --exclude-module scipy main.py
      
      - name: عمل Installer
        run: |
          curl -L -o is.exe https://jrsoftware.org/download.php/is.exe
          start /wait is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          (
          echo [Setup]
          echo AppName=KSO SnapTube
          echo AppVersion=2.0
          echo DefaultDirName={pf}\KSO SnapTube
          echo DefaultGroupName=KSO SnapTube
          echo UninstallDisplayIcon={app}\KSO_SnapTube.exe
          echo Compression=lzma2
          echo SolidCompression=yes
          echo OutputDir=.
          echo OutputBaseFilename=KSO_SnapTube_Setup
          echo [Files]
          echo Source: "dist\KSO_SnapTube.exe"; DestDir: "{app}"
          echo Source: "icon.ico"; DestDir: "{app}"
          echo [Icons]
          echo Name: "{group}\KSO SnapTube"; Filename: "{app}\KSO_SnapTube.exe"; IconFilename: "{app}\icon.ico"
          echo Name: "{group}\Uninstall KSO SnapTube"; Filename: "{uninstallexe}"
          echo Name: "{commondesktop}\KSO SnapTube"; Filename: "{app}\KSO_SnapTube.exe"; IconFilename: "{app}\icon.ico"
          echo [Run]
          echo Filename: "{app}\KSO_SnapTube.exe"; Description: "تشغيل KSO SnapTube"; Flags: postinstall nowait skipifsilent
          echo [UninstallDelete]
          echo Type: filesandordirs; Name: "{app}"
          ) > installer.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: cmd
      
      - name: رفع الملفات
        uses: actions/upload-artifact@v4
        with:
          name: KSO_SnapTube_Installer
          path: |
            KSO_SnapTube_Setup.exe
            dist/KSO_SnapTube.exe
