name: Build SnapTube KSO v1.0.2 Setup
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Download yt-dlp.exe
      run: curl -L -o yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
      
    - name: Create main.py
      shell: powershell
      run: |
        @"
        import sys, os, json, subprocess, threading, re
        from PyQt5.QtWidgets import *
        from PyQt5.QtCore import *
        from PyQt5.QtWebEngineWidgets import QWebEngineView
        from PyQt5.QtWebChannel import QWebChannel

        DOWNLOAD_PATH = os.path.join(os.path.expanduser("~"), "Downloads", "SnapTube-KSO")
        os.makedirs(DOWNLOAD_PATH, exist_ok=True)
        YTDLP = "yt-dlp.exe"

        class Bridge(QObject):
            @pyqtSlot(str, result=str)
            def getPlaylist(self, url):
                try:
                    cmd = [YTDLP, '--dump-json', '--flat-playlist', '--no-download', url]
                    res = subprocess.check_output(cmd, stderr=subprocess.DEVNULL, text=True, encoding='utf-8')
                    items = [json.loads(l) for l in res.strip().split('\n') if l]
                    return json.dumps([{'id':i['id'],'title':i['title']} for i in items])
                except:
                    vid = re.search(r'v=([a-zA-Z0-9_-]{11})', url)
                    if vid: return json.dumps([{'id':vid.group(1),'title':'فيديو واحد'}])
                    return '[]'

            @pyqtSlot(str, str)
            def downloadList(self, items_json, format):
                items = json.loads(items_json)
                for v in items:
                    args = [YTDLP, '-o', os.path.join(DOWNLOAD_PATH, '%(title)s.%(ext)s'), '--newline']
                    if format == 'mp3': args += ['-x', '--audio-format', 'mp3']
                    else: args += ['-f', f'bestvideo[height<={format}]+bestaudio/best[height<={format}]']
                    args.append(f"https://www.youtube.com/watch?v={v['id']}")
                    threading.Thread(target=subprocess.Popen, args=(args,)).start()

            @pyqtSlot(result=str)
            def getFiles(self):
                try:
                    files = [f for f in os.listdir(DOWNLOAD_PATH) if f.endswith(('.mp4','.mp3','.mkv','.webm'))]
                    return json.dumps([{'name':f, 'path':os.path.join(DOWNLOAD_PATH,f)} for f in files])
                except: return '[]'

            @pyqtSlot(str)
            def deleteFile(self, path): 
                try: os.remove(path)
                except: pass

            @pyqtSlot()
            def openFolder(self): 
                os.startfile(DOWNLOAD_PATH)

        class Main(QMainWindow):
            def __init__(self):
                super().__init__()
                self.setWindowTitle("SnapTube KSO v1.0.2")
                self.resize(1200, 800)
                self.tabs = QTabWidget()
                self.setCentralWidget(self.tabs)
                self.browser = QWebEngineView()
                self.browser.load(QUrl("https://m.youtube.com"))
                self.tabs.addTab(self.browser, "🏠 المتصفح")
                channel = QWebChannel()
                self.bridge = Bridge()
                channel.registerObject("kso", self.bridge)
                self.browser.page().setWebChannel(channel)
                js = "new QWebChannel(qt.webChannelTransport, function(channel) {window.kso = channel.objects.kso;setInterval(()=>{let v=document.querySelector('video');if(v&&!document.getElementById('ksoBtn')){let b=document.createElement('button');b.id='ksoBtn';b.innerText='⬇️ تحميل';b.style='position:fixed;top:10px;left:10px;z-index:999;background:#FF0000;color:white;border:0;padding:10px 15px;border-radius:25px;cursor:pointer;font-size:15px;font-weight:bold;';b.onclick=()=>{kso.getPlaylist(window.location.href, function(res){let items = JSON.parse(res);let html = '<select id=ksoFormat><option value=720>720p</option><option value=mp3>MP3</option></select><br>';items.forEach((i,idx)=>{html+=`<input type=checkbox id=c${idx} checked><label for=c${idx}>${i.title}</label><br>`});html+='<button onclick=doDl()>تحميل</button>';let d=document.createElement('div');d.id='ksoPop';d.style='position:fixed;top:10%;left:10%;width:80%;background:#222;padding:20px;z-index:999;color:white;max-height:80%;overflow:auto;';d.innerHTML=html;document.body.appendChild(d);window.ksoItems = items;window.doDl = ()=>{let selected = window.ksoItems.filter((_,idx)=>document.getElementById('c'+idx).checked);kso.downloadList(JSON.stringify(selected), document.getElementById('ksoFormat').value);document.getElementById('ksoPop').remove();}});};document.body.appendChild(b);}},1000);});"
                self.browser.page().runJavaScript(js)
                lib = QWidget()
                v = QVBoxLayout(lib)
                btn = QPushButton("فتح الفولدر")
                btn.clicked.connect(self.bridge.openFolder)
                v.addWidget(btn)
                self.list = QListWidget()
                v.addWidget(self.list)
                self.tabs.addTab(lib, "📁 مكتبتي")
                self.tabs.currentChanged.connect(self.loadFiles)
            def loadFiles(self, idx):
                if idx==1:
                    self.list.clear()
                    files = json.loads(self.bridge.getFiles())
                    for f in files:
                        item = QListWidgetItem(f['name'])
                        item.setData(Qt.UserRole, f['path'])
                        self.list.addItem(item)
                    self.list.itemDoubleClicked.connect(lambda i: os.startfile(i.data(Qt.UserRole)))
        if __name__ == '__main__':
            app = QApplication(sys.argv)
            w = Main()
            w.show()
            sys.exit(app.exec_())
        "@ | Out-File main.py -Encoding utf8
        
    - name: Install
      run: pip install PyQt5 PyQtWebEngine pyinstaller
      
    - name: Build EXE
      run: pyinstaller --onefile --windowed --name "SnapTube KSO" --add-data "yt-dlp.exe;." main.py
      
    - name: Install Inno Setup
      run: choco install innosetup -y
      
    - name: Create Setup.exe
      shell: powershell
      run: |
        @"
        [Setup]
        AppName=SnapTube KSO
        AppVersion=1.0.2
        AppPublisher=KSO
        DefaultDirName={pf}\SnapTube KSO
        DefaultGroupName=SnapTube KSO
        OutputDir=dist
        OutputBaseFilename=SnapTube-KSO-Setup-v1.0.2
        Compression=lzma2
        SolidCompression=yes
        WizardStyle=modern
        [Files]
        Source: "dist\SnapTube KSO.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "yt-dlp.exe"; DestDir: "{app}"; Flags: ignoreversion
        [Icons]
        Name: "{group}\SnapTube KSO"; Filename: "{app}\SnapTube KSO.exe"
        Name: "{commondesktop}\SnapTube KSO"; Filename: "{app}\SnapTube KSO.exe"; Tasks: desktopicon
        [Tasks]
        Name: "desktopicon"; Description: "Create a &desktop icon"; GroupDescription: "Additional icons:"
        [Run]
        Filename: "{app}\SnapTube KSO.exe"; Description: "Launch SnapTube KSO"; Flags: nowait postinstall skipifsilent
        "@ | Out-File setup.iss -Encoding utf8
        iscc setup.iss
      
    - name: Upload Setup
      uses: actions/upload-artifact@v4
      with:
        name: SnapTube-KSO-Setup-v1.0.2-Windows
        path: dist/SnapTube-KSO-Setup-v1.0.2.exe
