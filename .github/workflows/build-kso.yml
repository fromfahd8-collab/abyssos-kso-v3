name: Build KSO SnapTube EXE
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت FFmpeg
        run: |
          choco install ffmpeg -y
          ffmpeg -version

      - name: تثبيت المتطلبات
        run: pip install yt-dlp[default] customtkinter pillow pyinstaller --upgrade

      - name: تحميل الأيقونة
        run: |
          curl -L -o icon.ico https://raw.githubusercontent.com/sandwich1988/icon/main/snaptube.ico
          if not exist icon.ico echo Favicon failed

      - name: إنشاء ملف البرنامج
        run: |
          @echo off
          (
          echo import customtkinter as ctk
          echo import yt_dlp, os, threading, tkinter.filedialog as fd
          echo from tkinter import messagebox
          echo import webbrowser
          echo import datetime
          echo import ctypes
          echo def is_admin():
          echo try: return ctypes.windll.shell32.IsUserAnAdmin()
          echo except: return False
          echo ctk.set_appearance_mode("dark")
          echo ctk.set_default_color_theme("blue")
          echo app = ctk.CTk()
          echo app.geometry("900x750")
          echo app.title("KSO SnapTube - تحميل الفيديوهات والصوت")
          echo try:
          echo app.iconbitmap("icon.ico")
          echo except:
          echo pass
          echo app.resizable(True, True)
          echo save_path = os.path.join(os.path.expanduser("~"), "Downloads")
          echo download_type = "mp3"
          echo selected_quality = "720p"
          echo def choose_path():
          echo global save_path
          echo temp = fd.askdirectory()
          echo if temp:
          echo save_path = temp
          echo path_label.configure(text=f"📁 مسار التحميل: {save_path}")
          echo def log(msg, type="info"):
          echo timestamp = datetime.datetime.now().strftime("%H:%M:%S")
          echo if type == "success":
          echo listbox.insert("end", f"[{timestamp}] ✅ {msg}")
          echo elif type == "error":
          echo listbox.insert("end", f"[{timestamp}] ❌ {msg}")
          echo elif type == "warning":
          echo listbox.insert("end", f"[{timestamp}] ⚠️ {msg}")
          echo else:
          echo listbox.insert("end", f"[{timestamp}] ℹ️ {msg}")
          echo listbox.see("end")
          echo app.update()
          echo def get_quality_format(quality):
          echo quality_map = {"144p": "worst[height<=144]","240p": "best[height<=240]","360p": "best[height<=360]","480p": "best[height<=480]","720p": "best[height<=720]","1080p": "best[height<=1080]","4K": "best[height<=2160]"}
          echo return quality_map.get(quality, "best[height<=720]")
          echo def download():
          echo url = entry.get().strip()
          echo if not url:
          echo messagebox.showwarning("تنبيه", "الرجاء إدخال رابط الفيديو أو البلاي ليست")
          echo return
          echo btn.configure(state="disabled", text="⏳ جاري التحميل...")
          echo try:
          echo format_type = "mp3" if download_type == "mp3" else "mp4"
          echo log(f"بدء تحميل {format_type.upper()} من: {url}", "info")
          echo if download_type == "mp3":
          echo ydl_opts = {"format": "bestaudio/best","postprocessors": [{"key": "FFmpegExtractAudio","preferredcodec": "mp3","preferredquality": "320"}],"outtmpl": f"{save_path}/%(playlist_title)s/%(title)s.%(ext)s","progress_hooks": [lambda d: log(f"تحميل: {d.get('_percent_str', '')} - {d.get('_speed_str', '')}", "info") if d.get('status') == 'downloading' else None],}
          echo else:
          echo quality_format = get_quality_format(selected_quality)
          echo log(f"جودة التحميل: {selected_quality}", "info")
          echo ydl_opts = {"format": quality_format,"outtmpl": f"{save_path}/%(playlist_title)s/%(title)s.%(ext)s","progress_hooks": [lambda d: log(f"تحميل: {d.get('_percent_str', '')} - {d.get('_speed_str', '')}", "info") if d.get('status') == 'downloading' else None],}
          echo with yt_dlp.YoutubeDL(ydl_opts) as ydl:
          echo info = ydl.extract_info(url, download=False)
          echo if 'entries' in info:
          echo entries = [e for e in info['entries'] if e is not None]
          echo count = len(entries)
          echo if count > 0:
          echo log(f"تم العثور على {count} فيديو في البلاي ليست", "success")
          echo else:
          echo log("⚠️ البلاي ليست فارغة", "warning")
          echo btn.configure(state="normal", text="🚀 ابدأ التحميل")
          echo return
          echo else:
          echo log("تم العثور على فيديو واحد", "success")
          echo ydl.download([url])
          echo log("✅ تم التحميل بنجاح 100%", "success")
          echo messagebox.showinfo("نجاح", "تم تحميل الملفات بنجاح!")
          echo except Exception as e:
          echo error_msg = str(e)
          echo if "ffmpeg" in error_msg.lower():
          echo log("❌ خطأ: يرجى تثبيت FFmpeg", "error")
          echo else:
          echo log(f"❌ خطأ: {error_msg}", "error")
          echo messagebox.showerror("خطأ", f"حدث خطأ:\n{error_msg}")
          echo btn.configure(state="normal", text="🚀 ابدأ التحميل")
          echo def start():
          echo threading.Thread(target=download, daemon=True).start()
          echo def change_download_type(choice):
          echo global download_type
          echo download_type = "mp3" if choice == "MP3 (صوت)" else "mp4"
          echo if download_type == "mp3":
          echo quality_menu.configure(state="disabled")
          echo else:
          echo quality_menu.configure(state="normal")
          echo log(f"تم تغيير نوع التحميل إلى: {choice}", "info")
          echo def change_quality(choice):
          echo global selected_quality
          echo selected_quality = choice
          echo log(f"تم تغيير الجودة إلى: {choice}", "info")
          echo def open_folder():
          echo os.startfile(save_path)
          echo def open_github():
          echo webbrowser.open("https://github.com")
          echo title_label = ctk.CTkLabel(app, text="🎵 KSO SnapTube", font=("Arial", 30, "bold"))
          echo title_label.pack(pady=15)
          echo subtitle_label = ctk.CTkLabel(app, text="تحميل فيديوهات وصوت من يوتيوب بجودة عالية", font=("Arial", 14))
          echo subtitle_label.pack(pady=5)
          echo top_frame = ctk.CTkFrame(app)
          echo top_frame.pack(pady=15, padx=20, fill="x")
          echo entry = ctk.CTkEntry(top_frame, placeholder_text="https://youtube.com/... - ضع الرابط هنا", width=500, height=40, font=("Arial", 13))
          echo entry.pack(side="left", padx=10, pady=10, expand=True, fill="x")
          echo btn = ctk.CTkButton(app, text="🚀 ابدأ التحميل", command=start, height=50, font=("Arial", 16, "bold"), fg_color="#2b7a78")
          echo btn.pack(pady=10, padx=20, fill="x")
          echo options_frame = ctk.CTkFrame(app)
          echo options_frame.pack(pady=10, padx=20, fill="x")
          echo download_type_menu = ctk.CTkOptionMenu(options_frame, values=["MP3 (صوت)", "MP4 (فيديو)"], command=change_download_type, width=150)
          echo download_type_menu.pack(side="left", padx=10)
          echo download_type_menu.set("MP3 (صوت)")
          echo quality_values = ["144p", "240p", "360p", "480p", "720p", "1080p", "4K"]
          echo quality_menu = ctk.CTkOptionMenu(options_frame, values=quality_values, command=change_quality, width=120)
          echo quality_menu.pack(side="left", padx=10)
          echo quality_menu.set("720p")
          echo quality_menu.configure(state="disabled")
          echo btn_path = ctk.CTkButton(options_frame, text="📂 اختيار مسار التحميل", command=choose_path, width=150)
          echo btn_path.pack(side="left", padx=10)
          echo btn_open_folder = ctk.CTkButton(options_frame, text="📁 فتح المجلد", command=open_folder, width=120)
          echo btn_open_folder.pack(side="left", padx=10)
          echo path_label = ctk.CTkLabel(app, text=f"📁 مسار التحميل: {save_path}", font=("Arial", 12))
          echo path_label.pack(pady=5)
          echo listbox = ctk.CTkTextbox(app, height=300, font=("Consolas", 11))
          echo listbox.pack(pady=10, padx=20, fill="both", expand=True)
          echo footer_label = ctk.CTkLabel(app, text="KSO SnapTube v2.0 | تحميل بجودة تصل إلى 4K", font=("Arial", 10))
          echo footer_label.pack(pady=5)
          echo log("🎵 KSO SnapTube جاهز!", "success")
          echo app.mainloop()
          ) > main.py

      - name: بناء البرنامج
        run: |
          pyinstaller --onefile --noconsole --name "KSO_SnapTube" --icon=icon.ico --exclude-module matplotlib --exclude-module numpy --exclude-module pandas --exclude-module scipy main.py

      - name: تحميل Inno Setup
        run: |
          curl -L -o innosetup.exe https://jrsoftware.org/download.php/is.exe
          start /wait innosetup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-

      - name: إنشاء ملف التثبيت
        run: |
          (
          echo [Setup]
          echo AppName=KSO SnapTube
          echo AppVersion=2.0
          echo DefaultDirName={pf}\KSO SnapTube
          echo DefaultGroupName=KSO SnapTube
          echo UninstallDisplayIcon={app}\KSO_SnapTube.exe
          echo Compression=lzma2
          echo SolidCompression=yes
          echo OutputDir=.
          echo OutputBaseFilename=KSO_SnapTube_Setup
          echo [Files]
          echo Source: "dist\KSO_SnapTube.exe"; DestDir: "{app}"
          echo Source: "icon.ico"; DestDir: "{app}"; Flags: ignoreversion
          echo [Icons]
          echo Name: "{group}\KSO SnapTube"; Filename: "{app}\KSO_SnapTube.exe"; IconFilename: "{app}\icon.ico"
          echo Name: "{group}\Uninstall KSO SnapTube"; Filename: "{uninstallexe}"
          echo Name: "{commondesktop}\KSO SnapTube"; Filename: "{app}\KSO_SnapTube.exe"; IconFilename: "{app}\icon.ico"
          echo [Run]
          echo Filename: "{app}\KSO_SnapTube.exe"; Description: "تشغيل KSO SnapTube"; Flags: postinstall nowait skipifsilent
          echo [UninstallDelete]
          echo Type: filesandordirs; Name: "{app}"
          ) > installer.iss
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: رفع ملفات التثبيت
        uses: actions/upload-artifact@v4
        with:
          name: KSO_SnapTube_Installer
          path: |
            KSO_SnapTube_Setup.exe
            dist/KSO_SnapTube.exe
