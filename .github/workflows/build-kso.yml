name: Build KSO-HANI V24.2 - FIX CD BUG [KSO]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Free Disk Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean

    - name: Install Tools V24.2 + Download Cores FIXED PERM
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools git fdisk xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core curl unzip minetest retroarch linux-generic casper plymouth plymouth-themes xserver-xorg-input-all xserver-xorg-input-libinput unclutter -qq
        
        cd /tmp
        curl -L -o snes9x.zip https://buildbot.libretro.com/nightly/linux/x86_64/latest/snes9x_libretro.so.zip && unzip -p snes9x.zip > snes9x_libretro.so && sudo mv snes9x_libretro.so /usr/lib/x86_64-linux-gnu/libretro/
        curl -L -o gambatte.zip https://buildbot.libretro.com/nightly/linux/x86_64/latest/gambatte_libretro.so.zip && unzip -p gambatte.zip > gambatte_libretro.so && sudo mv gambatte_libretro.so /usr/lib/x86_64-linux-gnu/libretro/
        curl -L -o fceumm.zip https://buildbot.libretro.com/nightly/linux/x86_64/latest/fceumm_libretro.so.zip && unzip -p fceumm.zip > fceumm_libretro.so && sudo mv fceumm_libretro.so /usr/lib/x86_64-linux-gnu/libretro/
        curl -L -o genesis.zip https://buildbot.libretro.com/nightly/linux/x86_64/latest/genesis_plus_gx_libretro.so.zip && unzip -p genesis.zip > genesis_plus_gx_libretro.so && sudo mv genesis_plus_gx_libretro.so /usr/lib/x86_64-linux-gnu/libretro/

    - name: Build RootFS + Download 100 Working Games
      run: |
        set -e
        rm -rf rootfs 
        mkdir -p rootfs
        ROOTFS_PATH=$(pwd)/rootfs  # الحل: نحفظ المسار المطلق
        cd $ROOTFS_PATH
        
        mkdir -p usr/share/plymouth/themes/kso-hani etc/alternatives usr/bin etc/skel/.config/i3 etc/skel/.minetest usr/share/games/kso/{SNES,GBA,NES,SEGA} usr/lib/x86_64-linux-gnu/libretro/
        
        cat > /tmp/kso.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-HANI
        Description=برمجة عبد الله و عبد الرحمن هاني [ KSO ]
        ModuleName=script
        EOF
        mv /tmp/kso.plymouth usr/share/plymouth/themes/kso-hani/kso-hani.plymouth
        ln -sf /usr/share/plymouth/themes/kso-hani/kso-hani.plymouth etc/alternatives/default.plymouth
        echo 'exec i3' | tee etc/skel/.xinitrc > /dev/null
        echo 'systemctl poweroff' | tee usr/bin/kso-shutdown > /dev/null
        chmod +x usr/bin/kso-shutdown
        
        cat > /tmp/i3config << 'EOF'
        set $mod Mod4
        exec --no-startup-id xsetroot -solid '#0F172A'
        exec --no-startup-id unclutter --timeout 2
        exec --no-startup-id xsetroot -cursor_name left_ptr
        font pango:DejaVuSansMono 10
        bindsym $mod+g exec retroarch
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun
        bindsym button3 exec rofi -show drun
        EOF
        mv /tmp/i3config etc/skel/.config/i3/config
        
        sudo cp /usr/lib/x86_64-linux-gnu/libretro/*.so usr/lib/x86_64-linux-gnu/libretro/
        
        cd usr/share/games/kso/
        mkdir -p snes gba nes sega
        
        download() { echo "TRYING: $2"; curl -L -m 30 -s -o $2 $1 || echo "FAIL: $2"; }
        
