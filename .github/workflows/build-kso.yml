name: Build KSO-HANI V34.FINAL7 - [KSO]
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools

      - name: Build RootFS + Kernel [KSO]
        run: |
          sudo debootstrap --arch=amd64 noble rootfs http://archive.ubuntu.com/ubuntu/
          echo 'deb http://archive.ubuntu.com/ubuntu noble main universe' | sudo tee rootfs/etc/apt/sources.list
          sudo chroot rootfs apt-get update
          
          # 1. الالعاب الحقيقية يا كسو [ KSO ]
          sudo chroot rootfs apt-get install -y --no-install-recommends linux-generic gnome-games lzip i3 minetest initramfs-tools
          
          # 2. الكيرنل بصلاحيات صح
          sudo mkdir -p iso/boot
          sudo cp rootfs/boot/vmlinuz-* iso/boot/vmlinuz
          sudo chmod 644 iso/boot/vmlinuz 
          KERNEL_VER=$(ls rootfs/boot/vmlinuz-* | sed 's/.*vmlinuz-//')
          sudo chroot rootfs update-initramfs -c -k $KERNEL_VER
          sudo cp rootfs/boot/initrd.img-$KERNEL_VER iso/boot/initrd.img
          sudo chmod 644 iso/boot/initrd.img
          ls -lh iso/boot/

          # 3. i3 + اختصارات الالعاب [KSO]
          sudo mkdir -p rootfs/etc/skel/.config/i3
          echo '# KSO-HANI V34.FINAL7' | sudo tee rootfs/etc/skel/.config/i3/config
          echo 'bindsym $mod+g exec gnome-games' | sudo tee -a rootfs/etc/skel/.config/i3/config # Win+G = الالغام + شطرنج + 2048
          echo 'bindsym $mod+m exec minetest' | sudo tee -a rootfs/etc/skel/.config/i3/config # Win+M = ماين كرافت
          echo 'bindsym $mod+q exec shutdown now' | sudo tee -a rootfs/etc/skel/.config/i3/config # Win+Q = قفل

          # 4. اوتو لوجن باسم KSO
          sudo mkdir -p rootfs/etc/systemd/system/getty@tty1.service.d
          echo -e '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin root --noclear %I $TERM' | sudo tee rootfs/etc/systemd/system/getty@tty1.service.d/override.conf

          # 5. ضغط
          mkdir -p iso/casper
          sudo mksquashfs rootfs iso/casper/filesystem.squashfs -comp xz -b 1048576 -no-xattrs

          # 6. GRUB باسم KSO-HANI
          sudo mkdir -p iso/boot/grub
          cat > iso/boot/grub/grub.cfg <<'EOF'
          set timeout=5
          set default=0
          set menu_color_normal=green/black
          set menu_color_highlight=white/green
          echo "========================================"
          echo " KSO-HANI V34.FINAL7 [KSO]"
          echo " [KSO] برمجة عبد الله و عبد الرحمن هاني"
          echo " Win+G = Games | Win+M = Minetest"
          echo "========================================"
          menuentry "KSO-HANI V34.FINAL7 Live [KSO]" {
            linux /boot/vmlinuz boot=casper quiet splash
            initrd /boot/initrd.img
          }
          EOF
          sudo grub-mkrescue -o KSO-HANI-V34.FINAL7.iso iso
          ls -lh KSO-HANI-V34.FINAL7.iso

      - name: Upload ISO [KSO]
        uses: actions/upload-artifact@v4
        with:
          name: KSO-HANI-V34.FINAL7-[KSO]
          path: KSO-HANI-V34.FINAL7.iso
