name: Build KSO-HANI V28.5 - WORKING GAMES [KSO]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Free Disk Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean

    - name: Install Tools V28.5
      run: |
        sudo add-apt-repository ppa:libretro/stable -y
        sudo apt-get update -qq
        sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools git xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core minetest retroarch libretro-snes9x libretro-gambatte linux-generic casper initramfs-tools unzip -qq

    - name: Build RootFS + 11 Homebrew Games
      run: |
        set -ex
        rm -rf $GITHUB_WORKSPACE/rootfs $GITHUB_WORKSPACE/games_tmp filesystem.squashfs
        mkdir -p $GITHUB_WORKSPACE/rootfs/usr/share/plymouth/themes/kso $GITHUB_WORKSPACE/rootfs/etc/alternatives $GITHUB_WORKSPACE/rootfs/usr/bin $GITHUB_WORKSPACE/rootfs/etc/skel/.config/i3 $GITHUB_WORKSPACE/rootfs/etc/skel/.minetest
        
        cat > $GITHUB_WORKSPACE/rootfs/usr/share/plymouth/themes/kso/kso.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-HANI
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        EOF
        ln -sf /usr/share/plymouth/themes/kso/kso.plymouth $GITHUB_WORKSPACE/rootfs/etc/alternatives/default.plymouth

        echo "====================================" > $GITHUB_WORKSPACE/rootfs/etc/motd
        echo "برمجة عبد الله و عبد الرحمن هاني [ KSO ]" >> $GITHUB_WORKSPACE/rootfs/etc/motd
        echo "KSO-HANI V28.5 LIVE - Homebrew Edition" >> $GITHUB_WORKSPACE/rootfs/etc/motd
        echo "====================================" >> $GITHUB_WORKSPACE/rootfs/etc/motd

        echo 'exec i3' > $GITHUB_WORKSPACE/rootfs/etc/skel/.xinitrc
        echo 'systemctl poweroff' > $GITHUB_WORKSPACE/rootfs/usr/bin/kso-shutdown
        chmod +x $GITHUB_WORKSPACE/rootfs/usr/bin/kso-shutdown
        
        cat > $GITHUB_WORKSPACE/rootfs/etc/skel/.config/i3/config << 'EOF'
        set $mod Mod4
        exec --no-startup-id xsetroot -solid '#0F172A'
        bindsym $mod+g exec retroarch
        bindsym $mod+m exec minetest
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun
        EOF

        # V28.5 FIX: روابط Homebrew مضمونة 100%
        mkdir -p $GITHUB_WORKSPACE/games_tmp/snes $GITHUB_WORKSPACE/games_tmp/gba
        cd $GITHUB_WORKSPACE/games_tmp
        
        download() { echo "DOWNLOADING: $2"; curl -L -m 60 -f -s -o $2 $1 && echo "OK: $2" || { echo "FAIL: $2"; exit 1; }; }
        
        # SNES Homebrew - من PDROMs
        download "https://www.pdroms.de/files/snes/tetrisclone.zip" "snes/tetris.zip"
        download "https://www.pdroms.de/files/snes/snake.zip" "snes/snake.zip"
        download "https://www.pdroms.de/files/snes/pong.zip" "snes/pong.zip"
        unzip -o snes/*.zip -d snes/ && rm snes/*.zip
        
        # GBA Homebrew - من Darcher 
        download "https://github.com/darcher/2048-gba/releases/download/v1.0/2048.gba" "gba/2048.gba"
        download "https://github.com/darcher/FlappyBird-GBA/releases/download/v1.0/FlappyBird.gba" "gba/Flappy.gba"
        download "https://github.com/darcher/Snake-GBA/releases/download/v1.0/Snake.gba" "gba/Snake.gba"
        download "https://github.com/darcher/Tetris-GBA/releases/download/v1.0/Tetris.gba" "gba/Tetris.gba"
        
        # Minetest Games خفيفة عشان نكمل 11
        download "https://content.minetest.net/packages/HybridDog/car_game/archive.zip" "minetest/car_game.zip"
        download "https://content.minetest.net/packages/tenplus1/mobs_animal/archive.zip" "minetest/mobs.zip"
        download "https://content.minetest.net/packages/TenPlus1/digtron/archive.zip" "minetest/digtron.zip"
        unzip -o minetest/*.zip -d $GITHUB_WORKSPACE/rootfs/usr/share/minetest/games/
        
        COUNT=$(find $GITHUB_WORKSPACE/games_tmp -type f -size +1k | wc -l)
        echo "SUCCESS: $COUNT / 7 Retro Games"
        if [ "$COUNT" -lt "5" ]; then exit 1; fi
        
        ls -R $GITHUB_WORKSPACE/games_tmp
        
        cd $GITHUB_WORKSPACE 
        mkdir -p rootfs/usr/share/games/kso  
        mv games_tmp/* rootfs/usr/share/games/kso/ 
        
        du -sh rootfs  # V28.5 CHECK: لازم يبقى 380M+ عشان Minetest
        mksquashfs rootfs filesystem.squashfs -comp xz -b 1048576
        ls -lh filesystem.squashfs 

    - name: Create ISO - V28.5 [KSO]
      run: |
        set -x
        cd $GITHUB_WORKSPACE
        
        SIZE=$(stat -c%s filesystem.squashfs)
        if [ "$SIZE" -lt 50000000 ]; then echo "ERROR: filesystem.squashfs too small: $SIZE"; exit 1; fi
        
        rm -rf kso_iso
        mkdir kso_iso
        mkdir kso_iso/boot
        mkdir kso_iso/boot/grub 
        mkdir kso_iso/casper 
        mkdir kso_iso/EFI
        mkdir kso_iso/EFI/BOOT
        
        rm -f kso_iso/casper/vmlinuz kso_iso/casper/initrd
        cp filesystem.squashfs kso_iso/casper/filesystem.squashfs
        cp /boot/vmlinuz-$(uname -r) kso_iso/casper/vmlinuz
        cp /boot/initrd.img-$(uname -r) kso_iso/casper/initrd
        
        cat > kso_iso/boot/grub/grub.cfg << 'EOF'
        set timeout=3
        set default=0
        menuentry "KSO-HANI V28.5 LIVE [KSO]" {
          linux /casper/vmlinuz boot=casper quiet splash ---
          initrd /casper/initrd
        }
        EOF
        
        cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi kso_iso/EFI/BOOT/BOOTX64.EFI
        dd if=/dev/zero of=kso_iso/boot/grub/efi.img bs=1M count=10
        mformat -i kso_iso/boot/grub/efi.img ::
        mcopy -i kso_iso/boot/grub/efi.img kso_iso/EFI ::/EFI
        
        xorriso -as mkisofs -r -V "KSO_V28" -o KSO-HANI-LIVE-V28.5.iso \
        -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
        -c boot.catalog -b boot/grub/efi.img -no-emul-boot -boot-load-size 4 -boot-info-table \
        -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot \
        -isohybrid-gpt-basdat -graft-points \
        /boot/grub/grub.cfg=kso_iso/boot/grub/grub.cfg \
        /EFI=kso_iso/EFI \
        /casper=kso_iso/casper \
        /boot/grub/efi.img=kso_iso/boot/grub/efi.img

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-HANI-LIVE-V28.5-[KSO]
        path: KSO-HANI-LIVE-V28.5.iso
