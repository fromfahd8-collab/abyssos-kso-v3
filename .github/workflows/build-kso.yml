name: Build KSO-HANI V25.6 - BOOT 100% [KSO]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Free Disk Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean

    - name: Install Tools V25.6
      run: |
        sudo add-apt-repository ppa:libretro/stable -y
        sudo apt-get update -qq
        sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools git xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core curl unzip minetest retroarch libretro-snes9x libretro-gambatte linux-generic casper initramfs-tools -qq

    - name: Build RootFS + Download 11 Games
      run: |
        set -e
        rm -rf rootfs /tmp/kso_games filesystem.squashfs
        mkdir -p rootfs/usr/share/plymouth/themes/kso rootfs/etc/alternatives rootfs/usr/bin rootfs/etc/skel/.config/i3 rootfs/etc/skel/.minetest rootfs/usr/share/games  # V25.6 FIX: عملنا games بس
        
        cat > rootfs/usr/share/plymouth/themes/kso/kso.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-HANI
        Description=برمجة عبد الله و عبد الرحمن هاني [ kso ]
        ModuleName=script
        EOF
        ln -sf /usr/share/plymouth/themes/kso/kso.plymouth rootfs/etc/alternatives/default.plymouth

        echo "====================================" > rootfs/etc/motd
        echo "برمجة عبد الله و عبد الرحمن هاني [ KSO ]" >> rootfs/etc/motd
        echo "KSO-HANI V25.6 LIVE - Retropie Edition" >> rootfs/etc/motd
        echo "====================================" >> rootfs/etc/motd

        echo 'exec i3' > rootfs/etc/skel/.xinitrc
        echo 'systemctl poweroff' > rootfs/usr/bin/kso-shutdown
        chmod +x rootfs/usr/bin/kso-shutdown
        
        cat > rootfs/etc/skel/.config/i3/config << 'EOF'
        set $mod Mod4
        exec --no-startup-id xsetroot -solid '#0F172A'
        bindsym $mod+g exec retroarch
        bindsym $mod+m exec minetest
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun
        EOF

        cat > rootfs/etc/skel/.minetest/minetest.conf << 'EOF'
        video_driver = opengl
        fps_max = 60
        EOF

        set +e 
        mkdir -p /tmp/kso_games/snes /tmp/kso_games/gba
        cd /tmp/kso_games
        download() { echo "TRYING: $2"; curl -L -m 30 -s -o $2 $1 && [ -s $2 ] && echo "OK: $2" || echo "FAIL: $2"; }
        
        download "https://github.com/snes-homebrew/roms/raw/main/Tetris.sfc" "snes/Tetris.sfc"
        download "https://github.com/snes-homebrew/roms/raw/main/SMW.sfc" "snes/Mario.sfc"
        download "https://github.com/snes-homebrew/roms/raw/main/SF2.sfc" "snes/SF2.sfc"
        download "https://github.com/snes-homebrew/roms/raw/main/Doom.sfc" "snes/Doom.sfc"
        download "https://github.com/snes-homebrew/roms/raw/main/Pong.sfc" "snes/Pong.sfc"
        download "https://github.com/snes-homebrew/roms/raw/main/Tanks.sfc" "snes/Tanks.sfc"
        download "https://github.com/gba-homebrew/roms/raw/main/CaveStory.gba" "gba/CaveStory.gba"
        download "https://github.com/gba-homebrew/roms/raw/main/2048.gba" "gba/2048.gba"
        download "https://github.com/gba-homebrew/roms/raw/main/FlappyBird.gba" "gba/Flappy.gba"
        download "https://github.com/gba-homebrew/roms/raw/main/Snake.gba" "gba/Snake.gba"
        download "https://github.com/gba-homebrew/roms/raw/main/Tetris.gba" "gba/Tetris.gba"
        set -e
        
        COUNT=$(find /tmp/kso_games -type f -size +1k | wc -l)
        echo "SUCCESS: $COUNT / 11"
        if [ "$COUNT" -lt "8" ]; then exit 1; fi
        
        cp -r /tmp/kso_games rootfs/usr/share/games/kso  # دلوقتي games موجود
        ls -lh rootfs/usr/share/games/kso 
        du -sh rootfs 
        mksquashfs rootfs filesystem.squashfs -comp xz -b 1048576
        ls -lh filesystem.squashfs 

    - name: Create ISO - V25.6 FIX CASPER [KSO]
      run: |
        cd $GITHUB_WORKSPACE
        rm -rf iso
        mkdir -p iso/boot/grub iso/casper iso/EFI/BOOT
        
        ls -lh filesystem.squashfs
        cp filesystem.squashfs iso/casper/filesystem.squashfs
        cp /boot/vmlinuz-* iso/casper/vmlinuz
        cp /boot/initrd.img-* iso/casper/initrd
        
        cat > iso/boot/grub/grub.cfg << 'EOF'
        set timeout=3
        set default=0
        menuentry "KSO-HANI V25.6 LIVE [KSO]" {
          linux /casper/vmlinuz boot=casper quiet splash ---
          initrd /casper/initrd
        }
        EOF
        
        cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
        dd if=/dev/zero of=iso/boot/grub/efi.img bs=1M count=10
        mformat -i iso/boot/grub/efi.img ::
        mcopy -i iso/boot/grub/efi.img iso/EFI ::/EFI
        
        xorriso -as mkisofs -r -V "KSO_V25" -o KSO-HANI-LIVE-V25.6.iso \
        -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
        -c boot.catalog -b boot/grub/efi.img -no-emul-boot -boot-load-size 4 -boot-info-table \
        -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot \
        -isohybrid-gpt-basdat -graft-points \
        /boot/grub/grub.cfg=iso/boot/grub/grub.cfg \
        /EFI=iso/EFI \
        /casper=iso/casper \
        /boot/grub/efi.img=iso/boot/grub/efi.img

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-HANI-LIVE-V25.6-[KSO]
        path: KSO-HANI-LIVE-V25.6.iso
