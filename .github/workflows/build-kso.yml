name: Build KSO-HANI V34.FINAL11 - [KSO]
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools

      - name: Build RootFS + Kernel [KSO]
        run: |
          sudo debootstrap --arch=amd64 noble rootfs http://archive.ubuntu.com/ubuntu/
          echo 'deb http://archive.ubuntu.com/ubuntu noble main universe' | sudo tee rootfs/etc/apt/sources.list
          sudo chroot rootfs apt-get update
          
          sudo chroot rootfs apt-get install -y --no-install-recommends linux-generic gnome-games lzip i3 minetest initramfs-tools
          
          sudo mkdir -p iso/boot
          sudo cp rootfs/boot/vmlinuz-* iso/boot/vmlinuz
          sudo chmod 644 iso/boot/vmlinuz 
          KERNEL_VER=$(ls rootfs/boot/vmlinuz-* | sed 's/.*vmlinuz-//')
          sudo chroot rootfs update-initramfs -c -k $KERNEL_VER
          sudo cp rootfs/boot/initrd.img-$KERNEL_VER iso/boot/initrd.img
          sudo chmod 644 iso/boot/initrd.img

          sudo mkdir -p rootfs/etc/skel/.config/i3
          echo '# KSO-HANI V34.FINAL11' | sudo tee rootfs/etc/skel/.config/i3/config
          echo 'bindsym $mod+g exec gnome-games' | sudo tee -a rootfs/etc/skel/.config/i3/config
          echo 'bindsym $mod+m exec minetest' | sudo tee -a rootfs/etc/skel/.config/i3/config
          echo 'bindsym $mod+q exec shutdown now' | sudo tee -a rootfs/etc/skel/.config/i3/config

          sudo mkdir -p rootfs/etc/systemd/system/getty@tty1.service.d
          echo -e '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin root --noclear %I $TERM' | sudo tee rootfs/etc/systemd/system/getty@tty1.service.d/override.conf

          sudo mkdir -p iso/casper
          sudo mksquashfs rootfs iso/casper/filesystem.squashfs -comp xz -b 1048576 -no-xattrs

          # <--- التعديل النهائي لـ GRUB FM [KSO]
          sudo mkdir -p iso/boot/grub
          echo -e 'set timeout=5\nset default=0\nset menu_color_normal=green/black\nset menu_color_highlight=white/green\necho "========================================"\necho " KSO-HANI V34.FINAL11 [KSO]"\necho " برمجة عبد الله و عبد الرحمن هاني [KSO]"\necho " Win+G = Games | Win+M = Minetest"\necho "========================================"\nmenuentry "KSO-HANI V34.FINAL11 Live [KSO]" {\n set isofile="/KSO-HANI-V34.FINAL11.iso"\n loopback kso_loop $isofile\n linux (kso_loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile noprompt noeject nomodeset toram ---\n initrd (kso_loop)/casper/initrd\n}' | sudo tee iso/boot/grub/grub.cfg > /dev/null

          sudo grub-mkrescue -o KSO-HANI-V34.FINAL11.iso iso
          ls -lh KSO-HANI-V34.FINAL11.iso

      - name: Upload ISO [KSO]
        uses: actions/upload-artifact@v4
        with:
          name: KSO-HANI-V34.FINAL11-[KSO]
          path: KSO-HANI-V34.FINAL11.iso
