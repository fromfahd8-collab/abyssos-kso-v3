        echo "SUCCESS: $COUNT / 100"
        if [ "$COUNT" -lt "100" ]; then echo "ERROR: Missing games, aborting"; exit 1; fi
        
        cp -r /tmp/kso_games/* usr/share/games/kso/
        mksquashfs . filesystem.squashfs -comp xz
        ls -lh filesystem.squashfs

    - name: Create ISO - V23.1 LIVE UEFI [KSO]
      run: |
        cd $GITHUB_WORKSPACE
        rm -rf isohybrid
        mkdir -p isohybrid/boot/grub
        
        KERNEL=$(ls /boot/vmlinuz-* | head -n 1)
        INITRD=$(ls /boot/initrd.img-* | head -n 1)
        sudo cp $KERNEL isohybrid/vmlinuz
        sudo cp $INITRD isohybrid/initrd 
        cp rootfs/filesystem.squashfs isohybrid/
        
        echo 'menuentry "KSO-HANI V23.1 LIVE [KSO]" { linux /vmlinuz boot=casper quiet splash }' | tee isohybrid/boot/grub/grub.cfg
        sudo cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi isohybrid/BOOTX64.EFI
        ls -lhR isohybrid/
        
        sudo xorriso -as mkisofs -o KSO-HANI-LIVE-V23.1.iso -isohybrid-gpt-basdat -eltorito-alt-boot -e BOOTX64.EFI -no-emul-boot -graft-points /boot/grub/grub.cfg=isohybrid/boot/grub/grub.cfg /casper/filesystem.squashfs=isohybrid/filesystem.squashfs /casper/vmlinuz=isohybrid/vmlinuz /casper/initrd=isohybrid/initrd -V "KSO_HANI_100" isohybrid/

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: KSO-HANI-LIVE-V23.1-[KSO]
        path: KSO-HANI-LIVE-V23.1.iso
