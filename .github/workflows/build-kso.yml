name: Build KSO SnapTube EXE
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت FFmpeg
        run: choco install ffmpeg -y

      - name: تثبيت المتطلبات
        run: |
          pip install yt-dlp customtkinter pillow
          pip install nuitka zstandard

      - name: إنشاء ملف main.py
        run: |
          @"
          import customtkinter as ctk
          import yt_dlp, os, threading, tkinter.filedialog as fd
          from tkinter import messagebox
          import datetime

          ctk.set_appearance_mode("dark")
          app = ctk.CTk()
          app.geometry("900x750")
          app.title("KSO SnapTube")

          save_path = os.path.join(os.path.expanduser("~"), "Downloads")
          download_type = "mp3"
          quality = "720p"

          def log(msg, t="info"):
              icons = {"success":"✅","error":"❌","info":"ℹ️"}
              listbox.insert("end", f"[{datetime.datetime.now().strftime('%H:%M:%S')}] {icons.get(t,'ℹ️')} {msg}")
              listbox.see("end"); app.update()

          def download():
              url = entry.get().strip()
              if not url: return
              btn.configure(state="disabled", text="⏳ جاري...")
              try:
                  opts = {"outtmpl": f"{save_path}/%(title)s.%(ext)s"}
                  if download_type == "mp3":
                      opts.update({"format": "bestaudio/best", "postprocessors": [{"key": "FFmpegExtractAudio", "preferredcodec": "mp3"}]})
                  else:
                      opts.update({"format": f"best[height<={quality.replace('p','')}]"})
                  with yt_dlp.YoutubeDL(opts) as ydl:
                      ydl.download([url])
                  log("تم التحميل ✅", "success")
              except Exception as e:
                  log(f"خطأ: {e}", "error")
              btn.configure(state="normal", text="🚀 تحميل")

          def start(): threading.Thread(target=download, daemon=True).start()

          def on_type(c):
              global download_type
              download_type = "mp3" if c == "MP3 (صوت)" else "mp4"
              quality_menu.configure(state="disabled" if download_type == "mp3" else "normal")

          def set_quality(c):
              global quality
              quality = c

          ctk.CTkLabel(app, text="🎵 KSO SnapTube", font=("Arial",30,"bold")).pack(pady=15)
          ctk.CTkLabel(app, text="تحميل فيديوهات وصوت من يوتيوب", font=("Arial",14)).pack(pady=5)

          f1 = ctk.CTkFrame(app); f1.pack(pady=15, padx=20, fill="x")
          entry = ctk.CTkEntry(f1, placeholder_text="رابط الفيديو أو البلاي ليست", height=40, font=("Arial",13))
          entry.pack(side="left", padx=10, expand=True, fill="x")

          btn = ctk.CTkButton(app, text="🚀 ابدأ التحميل", command=start, height=50, font=("Arial",16,"bold"), fg_color="#2b7a78")
          btn.pack(pady=10, padx=20, fill="x")

          f2 = ctk.CTkFrame(app); f2.pack(pady=10, padx=20, fill="x")
          ctk.CTkOptionMenu(f2, values=["MP3 (صوت)", "MP4 (فيديو)"], command=on_type, width=150).pack(side="left", padx=10)
          quality_menu = ctk.CTkOptionMenu(f2, values=["144p","240p","360p","480p","720p","1080p","4K"], command=set_quality, width=120)
          quality_menu.pack(side="left", padx=10)
          quality_menu.set("720p")
          quality_menu.configure(state="disabled")

          ctk.CTkButton(f2, text="📂 اختيار المسار", command=lambda: (lambda p: (p and (save_path.__setitem__(p) or path_label.configure(text=f"📁 {p}")))) (fd.askdirectory()), width=150).pack(side="left", padx=10)

          path_label = ctk.CTkLabel(app, text=f"📁 {save_path}", font=("Arial",12)); path_label.pack(pady=5)
          listbox = ctk.CTkTextbox(app, height=350, font=("Consolas",11)); listbox.pack(pady=10, padx=20, fill="both", expand=True)

          log("🎵 KSO SnapTube جاهز للتحميل!", "success")
          log("💡 اختر النوع والجودة والصق الرابط", "info")
          app.mainloop()
          "@ | Out-File -FilePath main.py -Encoding utf8
        shell: pwsh

      - name: تحضير الأيقونة
        run: |
          curl -L -o icon.ico https://raw.githubusercontent.com/sandwich1988/icon/main/snaptube.ico
          if (!(Test-Path icon.ico)) { python -c "from PIL import Image; Image.new('RGB', (64,64), color='#2b7a78').save('icon.ico', format='ICO', sizes=[(64,64)])" }
        shell: pwsh

      - name: بناء البرنامج باستخدام Nuitka (الحل السحري)
        run: |
          python -m nuitka --standalone --onefile --windows-console-mode=disable --windows-icon-from-ico=icon.ico --enable-plugin=tk-inter --include-package=yt_dlp --include-package=websockets --output-filename=KSO_SnapTube.exe main.py

      - name: رفع الملف
        uses: actions/upload-artifact@v4
        with:
          name: KSO_SnapTube_EXE
          path: KSO_SnapTube.exe
