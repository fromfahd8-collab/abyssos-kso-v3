name: Build SnapTube KSO
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      
      - name: Create main.py
        run: |
          echo import sys, os, subprocess, json, re > main.py
          echo from PyQt6.QtWidgets import * >> main.py
          echo from PyQt6.QtWebEngineWidgets import QWebEngineView >> main.py
          echo from PyQt6.QtCore import QUrl, QThread, pyqtSignal, QObject, pyqtSlot >> main.py
          echo from PyQt6.QtWebChannel import QWebChannel >> main.py
          echo DOWNLOAD_PATH = os.path.join(os.path.expanduser('~'), 'Downloads', 'SnapTube-KSO') >> main.py
          echo os.makedirs(DOWNLOAD_PATH, exist_ok=True) >> main.py
          echo class DownloaderThread(QThread): >> main.py
          echo progress = pyqtSignal(str, int); finished = pyqtSignal(str) >> main.py
          echo def __init__(self, urls, path, quality): super().__init__(); self.urls = urls if isinstance(urls, list) else [urls]; self.path = path; self.quality = quality >> main.py
          echo def run(self): >> main.py
          echo for url in self.urls: >> main.py
          echo cmd = ['yt-dlp', '-P', self.path, '--newline', '--no-playlist'] >> main.py
          echo cmd += ['-x', '--audio-format', 'mp3'] if self.quality == 'mp3' else ['-f', f'bestvideo[height<={self.quality}]+bestaudio/best'] >> main.py
          echo p = subprocess.Popen(cmd + [url], stdout=subprocess.PIPE, text=True, encoding='utf-8', errors='ignore') >> main.py
          echo title="فيديو" >> main.py
          echo for line in p.stdout: >> main.py
          echo if '%' in line: >> main.py
          echo try: self.progress.emit(title, int(float(line.split('%')[0].split()[-1]))) >> main.py
          echo except: pass >> main.py
          echo self.finished.emit(title) >> main.py
          echo class Bridge(QObject): >> main.py
          echo def __init__(self, w): super().__init__(); self.w=w >> main.py
          echo @pyqtSlot(str) >> main.py
          echo def download(self, u): self.w.start_download(u) >> main.py
          echo class MainWindow(QMainWindow): >> main.py
          echo def __init__(self): >> main.py
          echo super().__init__(); self.setWindowTitle("SnapTube KSO v1.3"); self.resize(1000,700) >> main.py
          echo tabs=QTabWidget(); tabs.setTabPosition(QTabWidget.TabPosition.South); self.setCentralWidget(tabs) >> main.py
          echo self.b=QWebEngineView(); self.b.setUrl(QUrl("https://www.youtube.com/")); self.b.loadFinished.connect(self.inject); tabs.addTab(self.b,"🏠 الرئيسية") >> main.py
          echo self.d=QListWidget(); tabs.addTab(self.d,"⬇️ التحميلات") >> main.py
          echo w=QWidget(); v=QVBoxLayout(w); self.l=QListWidget(); self.ref(); self.l.itemDoubleClicked.connect(lambda i: os.startfile(os.path.join(DOWNLOAD_PATH,i.text()))); btn=QPushButton("📂 فتح الفولدر"); btn.clicked.connect(lambda: os.startfile(DOWNLOAD_PATH)); v.addWidget(self.l); v.addWidget(btn); tabs.addTab(w,"📁 مكتبتي") >> main.py
          echo c=QWebChannel(); self.br=Bridge(self); c.registerObject('pyBridge',self.br); self.b.page().setWebChannel(c) >> main.py
          echo def inject(self): >> main.py
          echo js="new QWebChannel(qt.webChannelTransport,c=>{window.pyBridge=c.objects.pyBridge});setInterval(()=>{let v=document.querySelector('video');if(v&&!document.getElementById('k')){let b=document.createElement('button');b.id='k';b.innerText='⬇️ تحميل';b.style.cssText='position:fixed;bottom:80px;right:15px;z-index:99999;background:#FF0000;color:white;padding:14px 20px;border:none;border-radius:50px;font-size:16px;';b.onclick=()=>pyBridge.download(location.href);document.body.appendChild(b)}},2000);" >> main.py
          echo self.b.page().runJavaScript(js) >> main.py
          echo def start_download(self,u): >> main.py
          echo if 'list=' in u: QMessageBox.warning(self,"تنبيه","حمل الفيديوهات واحد احسن") >> main.py
          echo else: q,ok=QInputDialog.getItem(self,"الجودة","نزل بجودة ايه؟",[ "720p","1080p","mp3"],0,False); ok and self.run([u],q) >> main.py
          echo def run(self,urls,q): >> main.py
          echo self.centralWidget().setCurrentIndex(1) >> main.py
          echo for u in urls: item=QListWidgetItem("0% - انتظار"); self.d.addItem(item); t=DownloaderThread(u,DOWNLOAD_PATH,q); t.progress.connect(lambda x,y,i=item:i.setText(f"{y}% - {x}")); t.finished.connect(lambda x,i=item:[i.setText(f"✅ تم: {x}"),self.ref()]); t.start() >> main.py
          echo def ref(self): self.l.clear(); [self.l.addItem(f) for f in sorted(os.listdir(DOWNLOAD_PATH),reverse=True) if f.endswith(('.mp4','.mp3'))] >> main.py
          echo if __name__=='__main__': app=QApplication(sys.argv); w=MainWindow(); w.show(); sys.exit(app.exec()) >> main.py

      - name: Install
        run: pip install PyQt6 PyQt6-WebEngine yt-dlp pyinstaller

      - name: Build
        run: pyinstaller --onefile --noconsole --name "SnapTube-KSO" main.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SnapTube-KSO.exe
          path: dist/SnapTube-KSO.exe
