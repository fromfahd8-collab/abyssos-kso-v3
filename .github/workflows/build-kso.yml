name: Build KSO-HANI V23.1 - 100 GAMES LIVE [KSO]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Free Disk Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup && sudo apt-get clean

    - name: Install Tools V23.1
      run: |
        sudo add-apt-repository ppa:libretro/stable -y
        sudo apt-get update -qq
        sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools git fdisk xorriso i3 feh rofi fonts-noto-color-emoji fonts-dejavu-core curl unzip minetest retroarch libretro-snes9x libretro-gambatte libretro-fceumm libretro-genesis-plus-gx linux-generic casper plymouth plymouth-themes xserver-xorg-input-all xserver-xorg-input-libinput unclutter -qq

    - name: Build RootFS + Download 100 Games
      run: |
        set -e
        rm -rf rootfs /tmp/kso_games
        mkdir -p rootfs
        cd rootfs
        
        mkdir -p usr/share/plymouth/themes/kso-hani etc/alternatives usr/bin etc/skel/.config/i3 etc/skel/.minetest usr/share/games/kso/{SNES,GBA,NES,SEGA}
        
        cat > /tmp/kso.plymouth << 'EOF'
        [Plymouth Theme]
        Name=KSO-HANI
        Description=برمجة عبد الله و عبد الرحمن هاني [ KSO ]
        ModuleName=script
        EOF
        mv /tmp/kso.plymouth usr/share/plymouth/themes/kso-hani/kso-hani.plymouth
        ln -sf /usr/share/plymouth/themes/kso-hani/kso-hani.plymouth etc/alternatives/default.plymouth
        echo 'exec i3' | tee etc/skel/.xinitrc > /dev/null
        echo 'systemctl poweroff' | tee usr/bin/kso-shutdown > /dev/null
        chmod +x usr/bin/kso-shutdown
        
        cat > /tmp/i3config << 'EOF'
        set $mod Mod4
        exec --no-startup-id xsetroot -solid '#0F172A'
        exec --no-startup-id unclutter --timeout 2
        exec --no-startup-id xsetroot -cursor_name left_ptr
        font pango:DejaVuSansMono 10
        bindsym $mod+g exec retroarch
        bindsym $mod+q exec kso-shutdown
        bindsym $mod+d exec rofi -show drun
        bindsym button3 exec rofi -show drun
        EOF
        mv /tmp/i3config etc/skel/.config/i3/config
        
        cat > /tmp/minetest.conf << 'EOF'
        video_driver = opengl
        fps_max = 60
        EOF
        mv /tmp/minetest.conf etc/skel/.minetest/minetest.conf
        
        set +e 
        cd /tmp/kso_games
        mkdir -p snes gba nes sega
        
        download() { echo "TRYING: $2"; curl -L -m 30 -s -o $2 $1 && [ -s $2 ] && echo "OK: $2" && return 0 || echo "FAIL: $2"; }
        
        # SNES 25 لعبة
