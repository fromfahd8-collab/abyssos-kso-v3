name: Build KSO-HANI V31.3 - FIXED MKDIR [KSO]

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Free Disk Space
      run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup

    - name: Install Tools
      run: sudo apt-get update -qq && sudo apt-get install -y grub-efi-amd64-bin mtools squashfs-tools xorriso i3 feh rofi fonts-dejavu-core minetest retroarch libretro-snes9x libretro-gambatte linux-generic casper initramfs-tools unzip wget -qq

    - name: Build ISO 410MB V31.3 FIX
      run: |
        set -ex
        # V31.3 FIX: نعمل المجلدات واحد عشان GitHub ميزعلش
        mkdir -p rootfs
        mkdir -p rootfs/usr/share/games/kso/snes
        mkdir -p rootfs/usr/share/games/kso/gba 
        mkdir -p rootfs/usr/share/minetest/games
        mkdir -p rootfs/usr/share/plymouth/themes/kso
        mkdir -p rootfs/etc/skel/.config/i3 
        mkdir -p rootfs/usr/bin
        
        echo '[Plymouth Theme]\nName=KSO-HANI\nDescription=برمجة عبد الله و عبد الرحمن هاني [ kso ]\nModuleName=script' > rootfs/usr/share/plymouth/themes/kso/kso.plymouth
        ln -sf /usr/share/plymouth/themes/kso/kso.plymouth rootfs/etc/alternatives/default.plymouth
        
        echo 'exec i3' > rootfs/etc/skel/.xinitrc
        echo 'systemctl poweroff' > rootfs/usr/bin/kso-shutdown && chmod +x rootfs/usr/bin/kso-shutdown
        echo 'set $mod Mod4\nexec --no-startup-id xsetroot -solid "#0F172A"\nbindsym $mod+g exec retroarch\nbindsym $mod+m exec minetest\nbindsym $mod+q exec kso-shutdown\nbindsym $mod+d exec rofi -show drun' > rootfs/etc/skel/.config/i3/config
        
        cd rootfs/usr/share/minetest/games/
        wget -q https://github.com/minetest/minetest_game/archive/master.zip -O mg.zip
        unzip -q mg.zip && mv minetest_game-master minetest_game && rm mg.zip
        
        cd rootfs/usr/share/games/kso/
        wget -q https://github.com/libretro/test-roms/archive/refs/heads/master.zip -O roms.zip
        unzip -q roms.zip 
        cp test-roms-master/snes/*.sfc snes/
        cp test-roms-master/gba/*.gba gba/
        COUNT=$(find . -type f -size +1k | wc -l)
        echo "GAMES COUNT: $COUNT / 10"
        if [ "$COUNT" -lt "10" ]; then exit 1; fi
        
        cd $GITHUB_WORKSPACE 
        mksquashfs rootfs filesystem.squashfs -comp xz -b 1048576
        ls -lh filesystem.squashfs 
        
        mkdir iso && mkdir iso/boot/grub iso/casper iso/EFI/BOOT
        cp filesystem.squashfs iso/casper/ && cp /boot/vmlinuz-* iso/casper/vmlinuz && cp /boot/initrd.img-* iso/casper/initrd
        echo 'set timeout=3\nset default=0\nmenuentry "KSO-HANI V31.3 [KSO]" { linux /casper/vmlinuz boot=casper quiet splash ---\ninitrd /casper/initrd }' > iso/boot/grub/grub.cfg
        cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi iso/EFI/BOOT/BOOTX64.EFI
        dd if=/dev/zero of=iso/boot/grub/efi.img bs=1M count=10 && mformat -i iso/boot/grub/efi.img :: && mcopy -i iso/boot/grub/efi.img iso/EFI ::/EFI
        xorriso -as mkisofs -r -V "KSO_V31" -o KSO-HANI-V31.3.iso -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin -c boot.catalog -b boot/grub/efi.img -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e EFI/BOOT/BOOTX64.EFI -no-emul-boot -isohybrid-gpt-basdat -graft-points /boot/grub/grub.cfg=iso/boot/grub/grub.cfg /EFI=iso/EFI /casper=iso/casper /boot/grub/efi.img=iso/boot/grub/efi.img

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: KSO-HANI-V31.3-[KSO]
        path: KSO-HANI-V31.3.iso
